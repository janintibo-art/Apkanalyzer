name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: |
          set -e
          # Si le projet a Ã©tÃ© dÃ©posÃ© sous forme de .zip, on le dÃ©compresse
          ZIP="$(find "$GITHUB_WORKSPACE" -maxdepth 2 -name '*.zip' | head -n1)"
          if [ -n "$ZIP" ]; then
            echo "Archive detectee : $ZIP â€” decompression"
            mkdir -p "$GITHUB_WORKSPACE/_project"
            unzip -q -o "$ZIP" -d "$GITHUB_WORKSPACE/_project"
          fi
          # On cherche le dossier du projet (celui qui contient settings.gradle)
          SETTINGS="$(find "$GITHUB_WORKSPACE" -name 'settings.gradle*' | head -n1)"
          if [ -z "$SETTINGS" ]; then
            echo "::error::settings.gradle introuvable. Ajoute les fichiers du projet (ou le zip ApkAnalyzer.zip) dans le depot."
            exit 1
          fi
          PROJECT_DIR="$(dirname "$SETTINGS")"
          echo "Projet Gradle detecte : $PROJECT_DIR"
          echo "sdk.dir=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" > "$PROJECT_DIR/local.properties"
          curl -sSL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o "$RUNNER_TEMP/gradle.zip"
          unzip -q "$RUNNER_TEMP/gradle.zip" -d "$RUNNER_TEMP"
          GRADLE_BIN="$RUNNER_TEMP/gradle-8.7/bin/gradle"
          chmod +x "$GRADLE_BIN"
          cd "$PROJECT_DIR"
          "$GRADLE_BIN" assembleDebug --no-daemon --stacktrace
          echo "APK_PATH=$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
